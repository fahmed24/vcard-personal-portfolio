# .github/workflows/build-and-notify.yml
# App Repo Workflow
# Triggers on a new GitHub release, builds and pushes a Docker image,
# then notifies the K8s manifest repo to update the image tag.

name: Build, Push & Notify

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.event.release.tag_name }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}

  notify-manifest-repo:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Dispatch to manifest repo
        uses: peter-evans/repository-dispatch@v3
        with:
          # Create a PAT with repo scope and add it as a secret
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          repository: fahmed24/homelab
          event-type: image-update
          client-payload: |
            {
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",
              "tag": "${{ needs.build-and-push.outputs.image_tag }}",
              "digest": "${{ needs.build-and-push.outputs.image_digest }}",
              "repo": "${{ github.repository }}",
              "release": "${{ github.event.release.tag_name }}"
            }
